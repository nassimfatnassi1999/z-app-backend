services:
  z_postgres:
    image: postgres:16-alpine
    container_name: z_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      # These initialize only a new volume. deploy.sh supplies compatibility
      # fallbacks from POSTGRES_USER/POSTGRES_PASSWORD for existing installs.
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?POSTGRES_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - z_postgres_data:/var/lib/postgresql/data
    networks:
      - z_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  z_backend:
    container_name: z_backend
    restart: unless-stopped
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-z-backend:production}
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${PORT:?PORT is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      # Inside this container localhost points to z_backend, not PostgreSQL.
      # Validated and masked by deploy.sh before Compose is invoked.
      DATABASE_URL: ${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      EMAIL_CODE_SECRET: ${EMAIL_CODE_SECRET:?EMAIL_CODE_SECRET is required}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:?DEEPGRAM_API_KEY is required}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:?DEEPGRAM_MODEL is required}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
      GROQ_BASE_URL: ${GROQ_BASE_URL:?GROQ_BASE_URL is required}
      GROQ_EMAIL_MODEL: ${GROQ_EMAIL_MODEL:?GROQ_EMAIL_MODEL is required}
      GROQ_EXTRACTION_MODEL: ${GROQ_EXTRACTION_MODEL:?GROQ_EXTRACTION_MODEL is required}
      GROQ_VALIDATION_MODEL: ${GROQ_VALIDATION_MODEL:?GROQ_VALIDATION_MODEL is required}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:?AI_REQUEST_TIMEOUT_MS is required}
      AI_MAX_REPAIR_ATTEMPTS: ${AI_MAX_REPAIR_ATTEMPTS:?AI_MAX_REPAIR_ATTEMPTS is required}
      MAIL_ENABLED: ${MAIL_ENABLED:?MAIL_ENABLED is required}
    ports:
      - "${BACKEND_HOST_PORT:-3002}:${BACKEND_CONTAINER_PORT:-3000}"
    depends_on:
      z_postgres:
        condition: service_healthy
    networks:
      - z_network
    healthcheck:
      test: ["CMD", "node", "scripts/docker-healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    image: ${BACKEND_IMAGE:-z-backend:production}
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL is required}
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - z_network

volumes:
  z_postgres_data:

networks:
  z_network:
    name: z_network
