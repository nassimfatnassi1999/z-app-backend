services:
  z_postgres:
    image: postgres:16-alpine
    container_name: z_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      # These initialize only a new volume. deploy.sh supplies compatibility
      # fallbacks from POSTGRES_USER/POSTGRES_PASSWORD for existing installs.
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?POSTGRES_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - z_postgres_data:/var/lib/postgresql/data
    networks:
      - z_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  z_backend:
    container_name: z_backend
    restart: unless-stopped
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-z-backend:production}
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${PORT:?PORT is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      # Inside this container localhost points to z_backend, not PostgreSQL.
      # Validated and masked by deploy.sh before Compose is invoked.
      DATABASE_URL: ${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      EMAIL_CODE_SECRET: ${EMAIL_CODE_SECRET:?EMAIL_CODE_SECRET is required}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:?DEEPGRAM_API_KEY is required}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:?DEEPGRAM_MODEL is required}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
      GROQ_BASE_URL: ${GROQ_BASE_URL:?GROQ_BASE_URL is required}
      GROQ_MODEL: ${GROQ_MODEL:?GROQ_MODEL is required}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-0.35}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-1200}
      GROQ_EMAIL_MODEL: ${GROQ_EMAIL_MODEL:?GROQ_EMAIL_MODEL is required}
      AI_PROVIDER_ORDER: ${AI_PROVIDER_ORDER:-groq,gemini,openrouter}
      AI_PROVIDER_TIMEOUT_MS: ${AI_PROVIDER_TIMEOUT_MS:-30000}
      AI_PROVIDER_MAX_ATTEMPTS: ${AI_PROVIDER_MAX_ATTEMPTS:-3}
      AI_CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${AI_CIRCUIT_BREAKER_FAILURE_THRESHOLD:-3}
      AI_CIRCUIT_BREAKER_COOLDOWN_MS: ${AI_CIRCUIT_BREAKER_COOLDOWN_MS:-60000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.35}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-1200}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE:-0.35}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-1200}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Z}
      MAIL_ENABLED: ${MAIL_ENABLED:?MAIL_ENABLED is required}
    ports:
      - "${BACKEND_HOST_PORT:-3002}:${BACKEND_CONTAINER_PORT:-3000}"
    depends_on:
      z_postgres:
        condition: service_healthy
    networks:
      - z_network
    healthcheck:
      test: ["CMD", "node", "scripts/docker-healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    image: ${BACKEND_IMAGE:-z-backend:production}
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL is required}
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - z_network

volumes:
  z_postgres_data:

networks:
  z_network:
    name: z_network
